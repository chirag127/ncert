name: Daily NCERT Scrape

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force refresh all data'
        required: false
        default: false
        type: boolean

concurrency:
  group: scrape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        # version is read from package.json's packageManager field
        # (pnpm@10.10.0). Setting both here and in package.json errors
        # with "Multiple versions of pnpm specified".

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        # Run from the scraper package — playwright is a dep there but not
        # at the workspace root, so `pnpm exec playwright` from the root
        # errors with ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL.
        run: pnpm --filter=@ncert-library/scraper exec playwright install chromium

      - name: Run scraper
        run: pnpm scrape
        env:
          # The scraper writes books.json to ${OUTPUT_DIR}/metadata/books.json
          # and the metadata generator (packages/metadata/src/cli/generate.ts)
          # reads from ${DATA_DIR}/metadata/books.json. Both must point at
          # the same directory or the pipeline silently produces no output.
          OUTPUT_DIR: ./data
          FORCE_REFRESH: ${{ github.event.inputs.force || false }}

      - name: Merge PDFs
        run: pnpm merge:pdfs
        env:
          CHAPTERS_DIR: ./data/chapters
          OUTPUT_DIR: ./data/merged
        # Don't fail the whole pipeline if no chapter PDFs were downloaded
        # (the scraper currently runs in metadata-only mode). The merge step
        # is a best-effort enrichment for the website's `/data/merged/*.pdf`
        # fast path; the buttons fall back to NCERT's hosted PDF without it.
        continue-on-error: true

      - name: Generate metadata
        run: pnpm generate:metadata
        env:
          DATA_DIR: ./data

      - name: Generate search index
        run: pnpm generate:search
        env:
          METADATA_DIR: ./data/metadata
          OUTPUT_DIR: ./data/search-index

      - name: Sync to Firebase
        if: env.FIREBASE_PROJECT_ID
        run: pnpm sync:firebase
        env:
          DATA_DIR: ./data
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}

      - name: Upload scrape stats artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-stats
          path: |
            data/scrape-stats.json
            data/metadata/books.json
          if-no-files-found: warn

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "bot@ncert-library.org"
          git config --local user.name "NCERT Library Bot"
          git commit -m "chore: daily NCERT data update [skip ci]"
          git push
